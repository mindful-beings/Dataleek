    function clearConsole() {
        hackConsole.innerHTML = '';
    }

    function addLine(text, type = '') {
        const line = document.createElement('div');

    // Estrae il dominio da un'email
    function extractDomain(email) {
        const match = email.match(/@([^\s]+)/);
        return match ? match[1].toLowerCase() : '';
    }

    // Ricerca per nome, cognome o parte di email (con gestione punti)
    function searchByNameOrEmail(searchTerm) {
        const term = searchTerm.toLowerCase().replace(/\./g, '\\.');
        const regex = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
        
        return database.filter(user => 
            regex.test(user.email1) || 
            regex.test(user.email2) ||
            regex.test(user.id)
        );
    }

    // Ricerca per dominio esatto
    function searchByDomain(domain) {
        const cleanDomain = domain.replace('@', '').toLowerCase().trim();
        return database.filter(user => 
            extractDomain(user.email1) === cleanDomain || 
            extractDomain(user.email2) === cleanDomain
        );
    }

    // Mostra statistiche per dominio
    function showDomainStats(domain) {
        const users = searchByDomain(domain);
        const cleanDomain = domain.replace('@', '');
        
        if (users.length === 0) return null;
        
        // Raccogli email uniche per statistica
        const emails = new Set();
        users.forEach(u => {
            if (extractDomain(u.email1) === cleanDomain) emails.add(u.email1);
            if (extractDomain(u.email2) === cleanDomain) emails.add(u.email2);
        });
        
        return {
            count: users.length,
            uniqueEmails: emails.size,
            users: users
        };
    }

    // Simulazione hacking con fasi
    function startHackingSimulation(query, searchType, domainStats = null) {
        clearConsole();
        
        const phases = [
            { text: '[*] Initializing exploit module...', delay: 0 },
            { text: '[*] Target: registro.orsoline.it:443', delay: 200 },
            { text: `[*] Query: "${query}"`, delay: 400 },
            { text: `[*] Search type: ${searchType}`, delay: 600 },
            { text: '[*] Connecting to database...', delay: 800 },
            { text: '[+] Connection established', delay: 1000 },
            { text: '[*] Bypassing security layers...', delay: 1200 },
            { text: '[+] WAF bypassed', delay: 1500 },
            { text: '[*] Injecting search pattern...', delay: 1800 },
            { text: '[*] Extracting matching records...', delay: 2100 }
        ];

        phases.forEach(phase => {
            setTimeout(() => addLine(phase.text), phase.delay);
        });

        // Mostra risultati dopo 2.5 secondi
        setTimeout(() => {
            if (searchType === 'dominio' && domainStats) {
                showDomainResults(query, domainStats);
            } else {
                performSearch(query);
            }
        }, 2500);
    }

    function performSearch(query) {
        const trimmed = query.trim();
        if (!trimmed) return;

        resultArea.style.display = 'none';
        resultArea.innerHTML = '';

        // CASO 1: Ricerca per dominio (@ qualcosa)
        if (trimmed.includes('@')) {
            const domainStats = showDomainStats(trimmed);
            if (domainStats) {
                showDomainResults(trimmed, domainStats);
            } else {
                resultArea.style.display = 'block';
                resultArea.innerHTML = `<div class="result-line error">[-] Nessun utente trovato con dominio: ${trimmed}</div>`;
                addLine(`[-] Dominio ${trimmed} non trovato`, 'error');
            }
            return;
        }

        // CASO 2: ID o username (dedaloroma + numero o solo numero)
        const idMatch = trimmed.match(/(?:dedaloroma)?(\d{5,6})/i);
        if (idMatch) {
            const searchId = idMatch[1];
            const user = database.find(u => u.id === searchId);
            
            resultArea.style.display = 'block';
            
            if (user) {
                resultArea.innerHTML = `
                    <div class="result-line success">[+] TARGET ACQUISITO: dedaloroma${user.id}</div>
                    <div class="result-line email-found">📧 EMAIL 1: ${user.email1}</div>
                    <div class="result-line email-found">📧 EMAIL 2: ${user.email2}</div>
                    <div class="result-line">[+] Dati esfiltrati con successo</div>
                `;
                addLine(`[+] Email trovate per ID ${searchId}`, 'success');
            } else {
                resultArea.innerHTML = `<div class="result-line error">[-] ID ${searchId} non trovato nel database</div>`;
                addLine(`[-] ID ${searchId} non trovato`, 'error');
            }
            return;
        }

        // CASO 3: Ricerca per nome/cognome (testuale)
        const results = searchByNameOrEmail(trimmed);
        
        resultArea.style.display = 'block';
        
        if (results.length > 0) {
            let html = `<div class="result-line success">[+] TROVATI ${results.length} RISULTATI per "${trimmed}":</div>`;
            
            results.forEach(user => {
                html += `
                    <div class="result-line">→ dedaloroma${user.id}</div>
                    <div class="result-line email-found">  📧 ${user.email1}</div>
                    <div class="result-line email-found">  📧 ${user.email2}</div>
                `;
            });
            
            resultArea.innerHTML = html;
            addLine(`[+] Trovati ${results.length} risultati per "${trimmed}"`, 'success');
        } else {
            resultArea.innerHTML = `<div class="result-line error">[-] Nessun risultato per "${trimmed}"</div>`;
            addLine(`[-] Nessun risultato trovato`, 'error');
        }
    }

    function showDomainResults(domain, stats) {
        resultArea.style.display = 'block';
        
        let html = `
            <div class="result-line success">[+] DOMINIO: ${domain}</div>
            <div class="domain-stats">📊 Utenti trovati: ${stats.count}</div>
            <div class="domain-stats">📧 Email uniche: ${stats.uniqueEmails}</div>
        `;
        
        stats.users.forEach(user => {
            html += `
                <div class="result-line">→ dedaloroma${user.id}</div>
                <div class="result-line email-found">  📧 ${user.email1}</div>
                <div class="result-line email-found">  📧 ${user.email2}</div>
            `;
        });
        
        resultArea.innerHTML = html;
        addLine(`[+] Trovati ${stats.count} utenti con dominio ${domain}`, 'success');
    }

    // Event listener
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;

            resultArea.style.display = 'none';
            
            // Determina tipo di ricerca
            let searchType = 'testuale';
            if (query.includes('@')) searchType = 'dominio';
            else if (query.match(/\d{5,6}/)) searchType = 'ID';
            
            // Pre-calcola statistiche dominio se necessario
            let domainStats = null;
            if (searchType === 'dominio') {
                domainStats = showDomainStats(query);
            }
            
            startHackingSimulation(query, searchType, domainStats);
        }
    });

    // Welcome message
    addLine('[+] Sistema pronto. Inserisci:');
    addLine('[+] • dedaloroma130774 o 130776 (ricerca per ID)');
    addLine('[+] • Nome o cognome (es. "daniela" o "carosi")');
    addLine('[+] • @dominio (es. "@gmail.com" o "@libero.it")');
</script>
</body>
</html>
